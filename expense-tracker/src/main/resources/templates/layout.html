<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Expense Tracker</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #F5F6FA;
            display: flex;
            min-height: 100vh;
            font-size: 14px;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 235px;
            min-width: 235px;
            background: #ffffff;
            border-right: 1px solid #EBEBF0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 20px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #EBEBF0;
            text-decoration: none;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: #3B6FE8;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 15px;
            font-weight: 700;
            color: #1A1D23;
            letter-spacing: -0.3px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            color: #9CA3AF;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 10px 10px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: #6B7280;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .nav-item:hover {
            background: #F3F4F6;
            color: #1A1D23;
        }

        .nav-item.active {
            background: #EEF2FF;
            color: #3B6FE8;
            font-weight: 600;
        }

        .nav-item i {
            font-size: 16px;
            flex-shrink: 0;
        }

        .sidebar-bottom {
            padding: 12px;
            border-top: 1px solid #EBEBF0;
        }

        .nav-item.logout {
            color: #EF4444;
        }

        .nav-item.logout:hover {
            background: #FEF2F2;
            color: #DC2626;
        }

        /* ========== MAIN WRAPPER ========== */
        .main-wrapper {
            margin-left: 235px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ========== TOPBAR ========== */
        .topbar {
            background: #ffffff;
            border-bottom: 1px solid #EBEBF0;
            padding: 0 28px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .page-title {
            font-size: 16px;
            font-weight: 700;
            color: #1A1D23;
        }

        .topbar-divider {
            width: 1px;
            height: 20px;
            background: #EBEBF0;
        }

        .page-date {
            font-size: 13px;
            color: #6B7280;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid #EBEBF0;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #6B7280;
            transition: all 0.15s;
            text-decoration: none;
        }

        .icon-btn:hover {
            background: #F3F4F6;
            color: #1A1D23;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3B6FE8, #6B8FF8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ========== PAGE CONTENT ========== */
        .page-content {
            flex: 1;
            padding: 28px;
        }

        /* ========== CARDS ========== */
        .summary-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #EBEBF0;
            padding: 20px;
            height: 100%;
        }

        .summary-card .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 14px;
        }

        .card-icon.blue   { background: #EEF2FF; color: #3B6FE8; }
        .card-icon.red    { background: #FEF2F2; color: #EF4444; }
        .card-icon.green  { background: #F0FDF4; color: #16A34A; }
        .card-icon.purple { background: #FAF5FF; color: #7C3AED; }

        .card-label {
            font-size: 12px;
            color: #6B7280;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 22px;
            font-weight: 700;
            color: #1A1D23;
            margin-bottom: 4px;
        }

        .card-badge {
            font-size: 11px;
            font-weight: 500;
            color: #16A34A;
        }

        .card-badge.down { color: #EF4444; }

        /* ========== CONTENT CARDS ========== */
        .content-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #EBEBF0;
            padding: 24px;
        }

        .content-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .content-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #1A1D23;
        }

        .content-card-sub {
            font-size: 12px;
            color: #9CA3AF;
            margin-bottom: 20px;
        }

        /* ========== TABLE ========== */
        .custom-table {
            width: 100%;
            border-collapse: collapse;
        }

        .custom-table th {
            font-size: 11px;
            font-weight: 600;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 14px;
            border-bottom: 1px solid #EBEBF0;
            text-align: left;
        }

        .custom-table td {
            padding: 13px 14px;
            border-bottom: 1px solid #F3F4F6;
            color: #374151;
            font-size: 13.5px;
        }

        .custom-table tbody tr:hover {
            background: #FAFAFA;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* ========== BADGES ========== */
        .badge-category {
            background: #F3F4F6;
            color: #374151;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-income {
            background: #F0FDF4;
            color: #16A34A;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-expense {
            background: #FEF2F2;
            color: #EF4444;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ========== BUTTONS ========== */
        .btn-primary-custom {
            background: #3B6FE8;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-primary-custom:hover {
            background: #2D5DD4;
            color: white;
        }

        .btn-outline-custom {
            background: transparent;
            color: #3B6FE8;
            border: 1px solid #3B6FE8;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn-outline-custom:hover {
            background: #EEF2FF;
            color: #3B6FE8;
        }

        .btn-danger-custom {
            background: #FEF2F2;
            color: #EF4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn-danger-custom:hover {
            background: #FEE2E2;
            color: #DC2626;
        }

        .btn-edit-custom {
            background: #EEF2FF;
            color: #3B6FE8;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn-edit-custom:hover {
            background: #E0E7FF;
            color: #2D5DD4;
        }

        /* ========== FORMS ========== */
        .form-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #EBEBF0;
            padding: 28px;
            max-width: 600px;
        }

        .form-label-custom {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        .form-control-custom {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #EBEBF0;
            border-radius: 8px;
            font-size: 13.5px;
            color: #1A1D23;
            background: #FAFAFA;
            outline: none;
            transition: border 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .form-control-custom:focus {
            border-color: #3B6FE8;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59, 111, 232, 0.08);
        }

        .form-group {
            margin-bottom: 18px;
        }

        /* ========== PAGE HEADER ========== */
        .page-header {
            margin-bottom: 24px;
        }

        .page-header-title {
            font-size: 22px;
            font-weight: 700;
            color: #1A1D23;
        }

        .page-header-sub {
            font-size: 13px;
            color: #6B7280;
            margin-top: 3px;
        }

        /* ========== FOOTER ========== */
        .page-footer {
            text-align: center;
            padding: 20px 28px;
            border-top: 1px solid #EBEBF0;
            font-size: 12px;
            color: #9CA3AF;
            background: #fff;
        }

        /* ========== PROGRESS BAR ========== */
        .progress-custom {
            height: 8px;
            border-radius: 20px;
            background: #F3F4F6;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #3B6FE8, #6B8FF8);
        }

        /* ========== AMOUNT COLORS ========== */
        .amount-income { color: #16A34A; font-weight: 600; }
        .amount-expense { color: #EF4444; font-weight: 600; }
    </style>
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<div class="sidebar">
    <a class="sidebar-logo" th:href="@{/dashboard}">
        <div class="logo-icon">
            <i class="bi bi-currency-rupee" style="color:white; font-size:17px;"></i>
        </div>
        <span class="logo-text">ExpenseTracker</span>
    </a>

    <nav class="sidebar-nav">
        <span class="nav-section-label">Main Menu</span>

        <a th:href="@{/dashboard}"
           th:classappend="${activeMenu == 'dashboard'} ? 'active'"
           class="nav-item">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a th:href="@{/transactions}"
           th:classappend="${activeMenu == 'transactions'} ? 'active'"
           class="nav-item">
            <i class="bi bi-arrow-left-right"></i>
            Transactions
        </a>

        <a th:href="@{/categories}"
           th:classappend="${activeMenu == 'categories'} ? 'active'"
           class="nav-item">
            <i class="bi bi-tag"></i>
            Categories
        </a>

        <a th:href="@{/budgets}"
           th:classappend="${activeMenu == 'budgets'} ? 'active'"
           class="nav-item">
            <i class="bi bi-bar-chart"></i>
            Budgets
        </a>

        <a th:href="@{/goals}"
           th:classappend="${activeMenu == 'goals'} ? 'active'"
           class="nav-item">
            <i class="bi bi-lightning"></i>
            Savings Goals
        </a>

        <span class="nav-section-label" style="margin-top: 8px;">Insights</span>

        <a th:href="@{/reports}"
           th:classappend="${activeMenu == 'reports'} ? 'active'"
           class="nav-item">
            <i class="bi bi-file-earmark-bar-graph"></i>
            Reports
        </a>
    </nav>

    <div class="sidebar-bottom">
        <a href="#" class="nav-item logout">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>
    </div>
</div>

<!-- ========== MAIN WRAPPER ========== -->
<div class="main-wrapper">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="page-title" th:text="${title}">Page Title</span>
            <div class="topbar-divider"></div>
            <span class="page-date">
                <i class="bi bi-calendar3"></i>
                <span th:text="${#temporals.format(#temporals.createNow(), 'MMMM dd, yyyy')}">June 27, 2026</span>
            </span>
        </div>
        <div class="topbar-right">
            <a th:href="@{/transactions/add}" class="icon-btn" title="Add Transaction">
                <i class="bi bi-plus-lg"></i>
            </a>
            <a th:href="@{/reports}" class="icon-btn" title="Reports">
                <i class="bi bi-graph-up"></i>
            </a>
            <div class="avatar">P</div>
        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content" th:replace="${content}">
        <!-- page specific content goes here -->
    </div>

    <!-- FOOTER -->
    <div class="page-footer">
        &copy; 2026 ExpenseTracker. All rights reserved.
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

</body>
</html>
