<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Budget - Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F6FA; display: flex; min-height: 100vh; font-size: 14px; }
        .sidebar { width: 235px; min-width: 235px; background: #ffffff; border-right: 1px solid #EBEBF0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
        .sidebar-logo { padding: 20px 22px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #EBEBF0; text-decoration: none; }
        .logo-icon { width: 34px; height: 34px; background: #3B6FE8; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-size: 15px; font-weight: 700; color: #1A1D23; }
        .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
        .nav-section-label { font-size: 10px; font-weight: 600; color: #9CA3AF; letter-spacing: 0.8px; text-transform: uppercase; padding: 10px 10px 4px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #6B7280; font-size: 13.5px; font-weight: 500; text-decoration: none; transition: all 0.15s; }
        .nav-item:hover { background: #F3F4F6; color: #1A1D23; }
        .nav-item.active { background: #EEF2FF; color: #3B6FE8; font-weight: 600; }
        .nav-item i { font-size: 16px; }
        .sidebar-bottom { padding: 12px; border-top: 1px solid #EBEBF0; }
        .nav-item.logout { color: #EF4444; }
        .nav-item.logout:hover { background: #FEF2F2; }
        .main-wrapper { margin-left: 235px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { background: #ffffff; border-bottom: 1px solid #EBEBF0; padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 99; }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .page-title { font-size: 16px; font-weight: 700; color: #1A1D23; }
        .topbar-divider { width: 1px; height: 20px; background: #EBEBF0; }
        .page-date { font-size: 13px; color: #6B7280; display: flex; align-items: center; gap: 6px; }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #3B6FE8, #6B8FF8); display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 600; }
        .page-content { flex: 1; padding: 28px; }
        .page-header-title { font-size: 22px; font-weight: 700; color: #1A1D23; }
        .page-header-sub { font-size: 13px; color: #6B7280; margin-top: 3px; }
        .form-card { background: #fff; border-radius: 12px; border: 1px solid #EBEBF0; padding: 28px; max-width: 620px; }
        .form-group { margin-bottom: 18px; }
        .form-label-custom { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
        .form-control-custom { width: 100%; padding: 10px 14px; border: 1px solid #EBEBF0; border-radius: 8px; font-size: 13.5px; color: #1A1D23; background: #FAFAFA; outline: none; transition: border 0.15s; font-family: 'Inter', sans-serif; }
        .form-control-custom:focus { border-color: #3B6FE8; background: #fff; box-shadow: 0 0 0 3px rgba(59,111,232,0.08); }
        .btn-primary-custom { background: #3B6FE8; color: white; border: none; padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: background 0.15s; }
        .btn-primary-custom:hover { background: #2D5DD4; color: white; }
        .btn-cancel-custom { background: #F3F4F6; color: #6B7280; border: none; padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: background 0.15s; }
        .btn-cancel-custom:hover { background: #E5E7EB; color: #374151; }
        .page-footer { text-align: center; padding: 20px 28px; border-top: 1px solid #EBEBF0; font-size: 12px; color: #9CA3AF; background: #fff; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a class="sidebar-logo" th:href="@{/dashboard}">
        <div class="logo-icon">
            <i class="bi bi-currency-rupee" style="color:white; font-size:17px;"></i>
        </div>
        <span class="logo-text">ExpenseTracker</span>
    </a>
    <nav class="sidebar-nav">
        <span class="nav-section-label">Main Menu</span>
        <a th:href="@{/dashboard}"    class="nav-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a th:href="@{/transactions}" class="nav-item"><i class="bi bi-arrow-left-right"></i> Transactions</a>
        <a th:href="@{/categories}"   class="nav-item"><i class="bi bi-tag"></i> Categories</a>
        <a th:href="@{/budgets}"      class="nav-item active"><i class="bi bi-bar-chart"></i> Budgets</a>
        <a th:href="@{/goals}"        class="nav-item"><i class="bi bi-lightning"></i> Savings Goals</a>
        <span class="nav-section-label" style="margin-top:8px;">Insights</span>
        <a th:href="@{/reports}"      class="nav-item"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="#" class="nav-item logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="main-wrapper">

    <div class="topbar">
        <div class="topbar-left">
            <span class="page-title">Add Budget</span>
            <div class="topbar-divider"></div>
            <span class="page-date">
                <i class="bi bi-calendar3"></i>
                <span th:text="${#temporals.format(#temporals.createNow(), 'MMMM dd, yyyy')}">June 27, 2026</span>
            </span>
        </div>
        <div class="topbar-right">
            <div class="avatar">P</div>
        </div>
    </div>

    <div class="page-content">

        <div class="mb-4">
            <h4 class="page-header-title">Create New Budget</h4>
            <p class="page-header-sub">Set a monthly spending limit for a category.</p>
        </div>

        <div class="form-card">
            <form th:action="@{/budgets/save}" th:object="${budget}" method="post">

                <div class="form-group">
                    <label class="form-label-custom">Category Name</label>
                    <input type="text" th:field="*{categoryName}"
                           class="form-control-custom"
                           placeholder="e.g. Food, Travel, Rent">
                </div>

                <div class="form-group">
                    <label class="form-label-custom">Monthly Limit (₹)</label>
                    <input type="number" th:field="*{monthlyLimit}"
                           class="form-control-custom"
                           placeholder="e.g. 10000" step="0.01" min="0">
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <div class="form-group">
                            <label class="form-label-custom">Month (1-12)</label>
                            <input type="number" th:field="*{month}"
                                   class="form-control-custom"
                                   placeholder="e.g. 6" min="1" max="12">
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-group">
                            <label class="form-label-custom">Year</label>
                            <input type="number" th:field="*{year}"
                                   class="form-control-custom"
                                   placeholder="e.g. 2026" min="2000">
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-primary-custom">
                        <i class="bi bi-check-lg"></i> Save Budget
                    </button>
                    <a th:href="@{/budgets}" class="btn-cancel-custom">
                        <i class="bi bi-x-lg"></i> Cancel
                    </a>
                </div>

            </form>
        </div>

    </div>

    <div class="page-footer">&copy; 2026 ExpenseTracker. All rights reserved.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
